# ビルドはGitHub Actionsで行い、netlify-cliでデプロイするため
# Netlify側の自動ビルドは無効化
[build]
  command = "/bin/true"
  publish = "dist"

# キャッシュヘッダー
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
